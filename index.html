<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlazeFace 测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #2ecc71;
            text-align: center;
        }
        .instructions {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #2ecc71;
        }
        .instructions h3 {
            margin-top: 0;
            color: #2ecc71;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        .instructions li {
            margin: 8px 0;
            line-height: 1.6;
        }
        .video-container {
            position: relative;
            background: #000;
            border: 3px solid #0f3460;
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0;
        }
        #video {
            width: 100%;
            display: block;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #0f3460;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
        }
        button:hover {
            background: #16213e;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        button.primary {
            background: #2ecc71;
        }
        button.primary:hover {
            background: #27ae60;
        }
        #log {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-top: 20px;
        }
        .result {
            background: #2ecc71;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        .result.warning {
            background: #f39c12;
        }
        .result h2 {
            margin: 0 0 10px 0;
        }
        .result .pd-value {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }
        .result .confidence {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 10px;
        }
        .result .samples {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }
        .progress {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #0f3460;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: #2ecc71;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 智能瞳距测量工具</h1>

        <div class="instructions">
            <h3>📋 使用说明</h3>
            <ol>
                <li><strong>打开摄像头</strong>：点击下方按钮，允许浏览器访问摄像头</li>
                <li><strong>调整位置</strong>：保持脸部正对摄像头，距离 30-50cm</li>
                <li><strong>可选：银行卡校准</strong>：将标准银行卡（85.6mm宽）放在脸侧同一平面，可提高精度</li>
                <li><strong>开始测量</strong>：点击"测量瞳距"按钮，系统将自动采集 5 帧数据</li>
                <li><strong>查看结果</strong>：系统会显示平均瞳距值和置信度</li>
            </ol>
        </div>

        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startCamera()">打开摄像头</button>
            <button id="detectBtn" class="primary" onclick="measurePD()" disabled>测量瞳距</button>
            <button onclick="clearLog()">清空日志</button>
        </div>

        <div id="progressDiv" class="progress">
            <p id="progressText">正在采集数据...</p>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <div id="resultDiv" style="display: none;" class="result">
            <h2>✅ 测量结果</h2>
            <div class="pd-value" id="pdValue">-</div>
            <p id="pdMessage">-</p>
            <p class="confidence" id="pdConfidence">-</p>
            <p class="samples" id="pdSamples">-</p>
        </div>

        <div id="log"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const detectBtn = document.getElementById('detectBtn');
        const logDiv = document.getElementById('log');
        const resultDiv = document.getElementById('resultDiv');
        const pdValue = document.getElementById('pdValue');
        const pdMessage = document.getElementById('pdMessage');
        const pdConfidence = document.getElementById('pdConfidence');
        const pdSamples = document.getElementById('pdSamples');
        const progressDiv = document.getElementById('progressDiv');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');

        let stream = null;
        let model = null;

        // 配置参数
        const SAMPLE_COUNT = 5;           // 采样帧数
        const SAMPLE_DELAY_MS = 200;      // 采样间隔（毫秒）
        const DEFAULT_RATIO = 0.675;      // 默认比例（mm/px）- 基于实际瞳距校准
        const CARD_WIDTH_MM = 85.6;       // 标准银行卡宽度
        const PD_MIN = 54;                // 正常瞳距最小值
        const PD_MAX = 74;                // 正常瞳距最大值
        const STABILITY_THRESHOLD = 3;    // 稳定性阈值（mm）

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function clearLog() {
            logDiv.textContent = '';
        }

        function updateProgress(current, total) {
            const percent = (current / total) * 100;
            progressFill.style.width = `${percent}%`;
            progressText.textContent = `正在采集第 ${current}/${total} 帧数据...`;
        }

        async function startCamera() {
            try {
                log('🎬 开始打开摄像头...');
                startBtn.disabled = true;

                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 },
                    audio: false
                });

                video.srcObject = stream;
                log('✅ 摄像头已打开');

                await new Promise(resolve => {
                    video.onloadedmetadata = resolve;
                });

                log('📹 视频元数据已加载');
                log(`📐 视频尺寸: ${video.videoWidth}x${video.videoHeight}`);

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                log(`🖼️ Canvas 尺寸: ${canvas.width}x${canvas.height}`);

                log('🤖 加载 BlazeFace 模型...');
                await tf.ready();
                model = await blazeface.load();
                log('✅ BlazeFace 模型加载完成');

                detectBtn.disabled = false;
                log('🎉 准备就绪！点击"测量瞳距"按钮开始');

            } catch (error) {
                log(`❌ 错误: ${error.message}`);
                console.error(error);
                startBtn.disabled = false;
            }
        }

        // 检测银行卡（简化版，基于颜色和矩形检测）
        function detectCard(imageData) {
            // 这里简化处理，实际应该用 OpenCV 做边缘检测
            // 暂时返回 null，使用默认比例
            return null;
        }

        // 单次测量
        async function measureOnce() {
            // 清空 canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制当前帧
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 检测人脸
            const predictions = await model.estimateFaces(canvas, false);

            if (predictions.length === 0) {
                return null;
            }

            const face = predictions[0];
            const landmarks = face.landmarks;

            if (!landmarks || landmarks.length < 2) {
                return null;
            }

            // 计算双眼像素距离
            const rightEye = landmarks[0];
            const leftEye = landmarks[1];
            const pdPx = Math.hypot(leftEye[0] - rightEye[0], leftEye[1] - rightEye[1]);

            // 尝试检测银行卡
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const card = detectCard(imageData);

            let ratio = DEFAULT_RATIO;
            let cardDetected = false;

            if (card && card.widthPx > 0) {
                ratio = CARD_WIDTH_MM / card.widthPx;
                cardDetected = true;
            }

            const pdMm = pdPx * ratio;
            const confidence = face.probability ? face.probability[0] : 0;

            return {
                pdMm,
                pdPx,
                confidence,
                cardDetected,
                ratio,
                landmarks
            };
        }

        // 完整测量流程
        async function measurePD() {
            try {
                log('');
                log('=== 开始测量瞳距 ===');
                detectBtn.disabled = true;
                resultDiv.style.display = 'none';
                progressDiv.style.display = 'block';

                const samples = [];
                let cardDetectedCount = 0;
                let totalConfidence = 0;

                // 采集多帧数据
                for (let i = 0; i < SAMPLE_COUNT; i++) {
                    updateProgress(i + 1, SAMPLE_COUNT);

                    const result = await measureOnce();

                    if (result) {
                        samples.push(result.pdMm);
                        totalConfidence += result.confidence;
                        if (result.cardDetected) cardDetectedCount++;

                        log(`✅ 第 ${i + 1} 帧: PD=${result.pdMm.toFixed(2)}mm, 置信度=${(result.confidence * 100).toFixed(1)}%`);

                        // 绘制检测结果
                        ctx.strokeStyle = '#00ff00';
                        ctx.lineWidth = 2;
                        ctx.fillStyle = '#ff0000';

                        result.landmarks.forEach(point => {
                            ctx.beginPath();
                            ctx.arc(point[0], point[1], 5, 0, 2 * Math.PI);
                            ctx.fill();
                        });
                    } else {
                        log(`⚠️ 第 ${i + 1} 帧: 未检测到人脸`);
                    }

                    if (i < SAMPLE_COUNT - 1) {
                        await new Promise(resolve => setTimeout(resolve, SAMPLE_DELAY_MS));
                    }
                }

                progressDiv.style.display = 'none';

                // 分析结果
                if (samples.length === 0) {
                    log('❌ 未能采集到有效数据');
                    log('请确保：');
                    log('  1. 脸部正对摄像头');
                    log('  2. 光线充足');
                    log('  3. 距离适中（30-50cm）');
                    detectBtn.disabled = false;
                    return;
                }

                // 计算平均值和标准差
                const avgPD = samples.reduce((a, b) => a + b, 0) / samples.length;
                const variance = samples.reduce((sum, val) => sum + Math.pow(val - avgPD, 2), 0) / samples.length;
                const stdDev = Math.sqrt(variance);
                const avgConfidence = totalConfidence / samples.length;

                log('');
                log('📊 统计结果:');
                log(`  样本数: ${samples.length}/${SAMPLE_COUNT}`);
                log(`  平均瞳距: ${avgPD.toFixed(2)} mm`);
                log(`  标准差: ${stdDev.toFixed(2)} mm`);
                log(`  平均置信度: ${(avgConfidence * 100).toFixed(1)}%`);
                log(`  银行卡检测: ${cardDetectedCount}/${samples.length} 帧`);

                // 判断稳定性
                const isStable = stdDev < STABILITY_THRESHOLD;
                const isValid = avgPD >= PD_MIN && avgPD <= PD_MAX;
                const isHighConfidence = avgConfidence > 0.8 && samples.length >= 3;

                // 显示结果
                resultDiv.style.display = 'block';
                pdValue.textContent = `${avgPD.toFixed(1)} mm`;

                if (isValid && isStable && isHighConfidence) {
                    resultDiv.className = 'result';
                    pdMessage.textContent = `✅ 瞳距正常，建议选择鼻梁宽 16-18mm 的镜框`;
                } else if (!isStable) {
                    resultDiv.className = 'result warning';
                    pdMessage.textContent = `⚠️ 测量不稳定（标准差 ${stdDev.toFixed(1)}mm），建议重新测量`;
                } else if (!isValid) {
                    resultDiv.className = 'result warning';
                    pdMessage.textContent = `⚠️ 瞳距值异常，请确保正对摄像头并重新测量`;
                } else {
                    resultDiv.className = 'result warning';
                    pdMessage.textContent = `⚠️ 置信度较低，建议重新测量`;
                }

                pdConfidence.textContent = `置信度: ${(avgConfidence * 100).toFixed(1)}% | 稳定性: ${isStable ? '良好' : '较差'}`;
                pdSamples.textContent = `样本: ${samples.map(s => s.toFixed(1)).join(', ')} mm`;

                log('');
                log('🎉 测量完成！');

                detectBtn.disabled = false;

            } catch (error) {
                log(`❌ 测量错误: ${error.message}`);
                console.error(error);
                progressDiv.style.display = 'none';
                detectBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
